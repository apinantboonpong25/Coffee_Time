<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ติดตามออเดอร์</title>

<style>
body{
    font-family: Arial;
    padding:30px;
    background:
        linear-gradient(rgba(255,255,255,0.35), rgba(255,255,255,0.35)),
        url("images/background1.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.box{
    width:420px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
}

#orderNo{
    margin:15px 0;
}

#status{
    margin-top:15px;
}
</style>

</head>
<body>

<div class="box">

<h1>☕ Coffee Time ☕</h1>

<h2 id="orderNo"></h2>

<div id="status">กำลังโหลด...</div>

</div>

<script>

const API = "https://coffee-time-tmt5.onrender.com";

async function loadStatus(){

    const orderNo = localStorage.getItem("lastOrder");

    if(!orderNo){
        document.getElementById("orderNo").innerHTML = "";
        document.getElementById("status").innerHTML =
        "❌ ยังไม่มีออเดอร์";
        return;
    }

    try{

        const res = await fetch(API + "/order/" + orderNo);

        if(!res.ok){
            document.getElementById("status").innerHTML =
            "❌ ไม่พบออเดอร์";
            return;
        }

        const order = await res.json();

        document.getElementById("orderNo").innerHTML =
        "เลขออเดอร์ : " + order.orderNo;

        let color = "orange";

        switch(order.status){
            case "🟡 รอรับออเดอร์":
                color="gold";
                break;

            case "🔵 กำลังทำ":
                color="dodgerblue";
                break;

            case "🟢 เสร็จแล้ว":
                color="green";
                break;
        }

        document.getElementById("status").innerHTML = `
            <h2 style="color:${color}">
                ${order.status}
            </h2>

            <h3>ยอดรวม ${order.total} บาท</h3>
        `;

    }catch(err){

        console.error(err);

        document.getElementById("status").innerHTML =
        "❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";

    }

}

loadStatus();
setInterval(loadStatus,3000);

</script>

</body>
</html>
